<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WASM Gaming Engine Specs Demo</title>
    <link rel="stylesheet" href="./demo.css" />
  </head>
  <body>
    <div class="page"></div>

    <script type="text/html" name="launcher">
      <form class="launcher">
        <section class="sdk"></section>
        <section class="drop">
          <strong>Drop your ROM/asset file here</strong>
          <p>or choose one from your computer</p>
          <label class="picker">
            Pick file
            <input type="file" />
          </label>
        </section>
        <div class="status"></div>
      </form>
    </script>

    <script type="text/html" name="sdk-info">
      <h1><%= name %> (<%= id %>)</h1>
      <p><%= description %></p>
      <div class="row">
        <span class="pill">Version <%= version %></span>
        <span class="pill"><%= baseWidth %>x<%= baseHeight %></span>
        <span class="pill">Asset key: <%= assetKey %></span>
      </div>
    </script>

    <script type="module" src="./demo.js"></script>
  </body>
</html>
