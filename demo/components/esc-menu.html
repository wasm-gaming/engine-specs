<div class="esc-menu-wrapper">
  <!-- Fullscreen Modal Overlay -->
  <div :if="open" class="esc-overlay" @click.self="onClose">
    <div class="esc-panel" tabindex="-1">
      <!-- Header -->
      <header class="esc-header">
        <span class="esc-badge">{{ messages.escMenuBadge || 'PAUSED' }}</span>
        <h2>{{ title }}</h2>
        <button type="button" class="esc-header-exit-btn" @click="onExit">
          <i class="esc-icon exit"></i>
          {{ messages.escMenuExit || 'Exit to Launcher' }}
        </button>
        <button type="button" class="esc-close-btn" @click="onClose" aria-label="Close menu">&times;</button>
      </header>

      <!-- Scrollable Options Body -->
      <div class="esc-body">
        <div :each="group in optionGroups" class="esc-group">
          <h3 class="esc-group-title">{{ group.label }}</h3>

          <div :each="option in group.options" class="esc-row" :class.active="activeKey === option.key"
            @mouseenter="onHoverOption(option)" @click="onSelectOption(option)">

            <div class="esc-row-label">
              {{ option.label }}
              <span :if="option.requiresReset" class="esc-tag">{{ messages.escMenuNeedsResetTag || 'needs reset' }}</span>
            </div>

            <div class="esc-row-control">
              <!-- Boolean Chips: Off / On -->
              <div :if="option.type === 'boolean'" class="esc-chip-group">
                <button type="button" class="esc-chip" :class.active="!option.value"
                  @click.stop="onChangeOption(option, false)">
                  Off
                </button>
                <button type="button" class="esc-chip" :class.active="option.value"
                  @click.stop="onChangeOption(option, true)">
                  On
                </button>
              </div>

              <!-- Enum Choice Chips -->
              <div :if="option.type === 'enum' || option.type === 'select'" class="esc-chip-group">
                <button :each="choice in (option.values || option.choices || [])" type="button" class="esc-chip"
                  :class.active="option.value === choice.value" @click.stop="onChangeOption(option, choice.value)">
                  {{ choice.label }}
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer with Description, Actions & Shortcut Guide -->
      <footer class="esc-footer">
        <p class="esc-desc">{{ activeDescription || 'Select an option to view details.' }}</p>

        <div class="esc-actions">
          <button type="button" class="esc-action-btn primary" @click="onClose">
            <i class="esc-icon resume"></i>
            {{ messages.escMenuResume || 'Resume' }}
          </button>

          <button type="button" class="esc-action-btn" @click="onRestoreDefaults">
            <i class="esc-icon defaults"></i>
            {{ messages.escMenuRestoreDefaults || 'Restore defaults' }}
          </button>

          <button type="button" class="esc-action-btn" @click="onReset">
            <i class="esc-icon reset"></i>
            {{ messages.escMenuReset || 'Reset game' }}
          </button>

          <button :if="hasSaveStates" type="button" class="esc-action-btn" @click="onSaveState">
            <i class="esc-icon save"></i>
            {{ messages.escMenuSaveState || 'Save State' }}
          </button>

          <button :if="hasSaveStates" type="button" class="esc-action-btn" @click="onLoadState">
            <i class="esc-icon load"></i>
            {{ messages.escMenuLoadState || 'Load State' }}
          </button>

          <button :each="item in customItems" type="button" class="esc-action-btn custom" @click="onCustomAction(item)">
            {{ item.label }}
          </button>
        </div>

        <p class="esc-keys-hint">{{ messages.escMenuKeysHint || '↑ ↓ select · ← → change · Enter apply · Esc close' }}</p>
      </footer>
    </div>
  </div>
</div>

<script :setup="{
  open = false,
  title = 'Settings',
  subtitle = '',
  hasSaveStates = false,
  optionGroups = [],
  customItems = [],
  messages = {},
  onClose,
  onReset,
  onRestoreDefaults,
  onOptionChange,
  onSaveState,
  onLoadState,
  onExit,
  onCustomAction,
}">
  let activeKey = optionGroups?.[0]?.options?.[0]?.key || "";
  let activeDescription = optionGroups?.[0]?.options?.[0]?.description || "";

  const getFlatOptions = () => {
    const list = [];
    for (const group of optionGroups || []) {
      for (const opt of group.options || []) {
        list.push(opt);
      }
    }
    return list;
  };

  const onHoverOption = (option) => {
    if (!option) return;
    activeKey = option.key;
    activeDescription = option.description || "";
  };

  const onSelectOption = (option) => {
    onHoverOption(option);
  };

  const onChangeOption = (option, newValue) => {
    option.value = newValue;
    onHoverOption(option);
    onOptionChange?.(option.key, newValue, option);
    $emit("option-change", { key: option.key, value: newValue, option });
  };

  const handleKeyDown = (e) => {
    if (!open) return;
    const key = e.key;

    if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Enter"].includes(key)) {
      e.preventDefault();
      e.stopPropagation();

      const options = getFlatOptions();
      if (options.length === 0) return;

      let idx = options.findIndex((o) => o.key === activeKey);
      if (idx < 0) idx = 0;

      if (key === "ArrowDown") {
        const nextIdx = (idx + 1) % options.length;
        onHoverOption(options[nextIdx]);
      } else if (key === "ArrowUp") {
        const prevIdx = (idx - 1 + options.length) % options.length;
        onHoverOption(options[prevIdx]);
      } else if (key === "ArrowRight" || key === "ArrowLeft") {
        const opt = options[idx];
        if (!opt) return;

        if (opt.type === "boolean") {
          onChangeOption(opt, !opt.value);
        } else if (opt.type === "enum" || opt.type === "select") {
          const choices = opt.values || opt.choices || [];
          if (choices.length > 0) {
            const valIdx = choices.findIndex((c) => c.value === opt.value);
            let nextValIdx;
            if (key === "ArrowRight") {
              nextValIdx = (valIdx + 1) % choices.length;
            } else {
              nextValIdx = (valIdx - 1 + choices.length) % choices.length;
            }
            onChangeOption(opt, choices[nextValIdx].value);
          }
        }
      } else if (key === "Enter") {
        onClose?.();
      }
    }
  };

  if (typeof window !== "undefined") {
    window.addEventListener("keydown", handleKeyDown, true);
  }
</script>
