<form class="launcher">
  <section class="sdk">
    <CSdkInfo ...sdkInfo />
  </section>
  <section class="drop" :class.active="dragging" @dragover.prevent="dragging = true" @dragleave="dragging = false"
    @drop.prevent="onDrop">
    <strong>Drop your ROM/asset file here</strong>
    <p>{{ assetHint }}</p>
    <label class="picker">
      Pick file
      <input type="file" :accept="accept" @change="onPick" />
    </label>
  </section>
  <div class="status">{{ status }}</div>
</form>

<script :setup="{
  CSdkInfo,
  sdkInfo,
  onFile,
  accept,
  assetHint = 'or choose one from your computer',
}">
  let status = "Ready";
  let dragging = false;

  const onFileList = async (files) => {
    const file = files.item(0);
    if (!file) {
      return;
    }
    try {
      status = `Loading ${file.name}...`;
      await onFile(file);
    } catch (error) {
      const message = error instanceof Error ? error.message : String(error);
      status = `Failed to load file: ${message}`;
    }
  };

  const onDrop = async (event) => {
    dragging = false;
    if (event.dataTransfer?.files) {
      await onFileList(event.dataTransfer.files);
    }
  };

  const onPick = async (event) => {
    if (event.target.files) {
      await onFileList(event.target.files);
    }
  };
</script>
