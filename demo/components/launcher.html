
<form class="launcher">
  <section class="sdk"></section>
  <section class="drop">
    <strong>Drop your ROM/asset file here</strong>
    <p>or choose one from your computer</p>
    <label class="picker">
      Pick file
      <input type="file" />
    </label>
  </section>
  <div class="status"></div>
</form>

<script :fn="{ el, onFile }">
  const dropAreaEl = el.querySelector("section.drop");
  const statusEl = el.querySelector("div.status");
  const fileInputEl = el.querySelector("input[type='file']");

  const setStatus = (message) => {
    statusEl.textContent = message;
  };

  const onFileList = async (files) => {
    const file = files.item(0);
    if (!file) {
      return;
    }
    try {
      setStatus(`Loading ${file.name}...`);
      await onFile(file);
    } catch (error) {
      const message = error instanceof Error ? error.message : String(error);
      setStatus(`Failed to load file: ${message}`);
    }
  };

  dropAreaEl.addEventListener("dragover", (event) => {
    event.preventDefault();
    dropAreaEl.classList.add("active");
  });

  dropAreaEl.addEventListener("dragleave", () => {
    dropAreaEl.classList.remove("active");
  });

  dropAreaEl.addEventListener("drop", async (event) => {
    event.preventDefault();
    dropAreaEl.classList.remove("active");
    if (event.dataTransfer?.files) {
      await onFileList(event.dataTransfer.files);
    }
  });

  fileInputEl.addEventListener("change", async () => {
    if (fileInputEl.files) {
      await onFileList(fileInputEl.files);
    }
  });

  setStatus("Ready");

  return { setStatus };
</script>

<style>
  .launcher {
    width: min(740px, 100%);
    border: 1px solid var(--line);
    border-radius: 18px;
    background: var(--panel);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(8px);
    padding: 1.25rem;
    display: grid;
    gap: 1rem;
  }

  .sdk {
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 1rem;
  }

  .drop {
    border: 2px dashed rgba(255, 255, 255, 0.34);
    border-radius: 12px;
    padding: 1.5rem;
    text-align: center;
    transition: border-color 120ms ease, background-color 120ms ease;
  }

  .drop.active {
    border-color: var(--accent);
    background: rgba(53, 215, 160, 0.08);
  }

  .drop strong {
    display: block;
    margin-bottom: 0.4rem;
    font-size: 1.02rem;
  }

  .drop p {
    margin: 0.2rem 0;
    color: var(--muted);
  }

  .picker {
    display: inline-flex;
    margin-top: 0.8rem;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 0.6rem 0.95rem;
    cursor: pointer;
  }

  .picker input {
    display: none;
  }

  .status {
    min-height: 1.2rem;
    color: var(--muted);
    font-size: 0.92rem;
  }
</style>
