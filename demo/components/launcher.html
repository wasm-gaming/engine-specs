<form class="launcher" @submit.prevent="onLaunch">
  <section class="sdk">
    <CSdkInfo ...sdkInfo />
  </section>

  <div class="drop-grid" :class.single="!showBIOS">
    <CDropArea
      :if="showBIOS"
      :prompt="requiresBIOS ? 'Drop BIOS File (Required)' : 'Drop BIOS File (Optional)'"
      :asset-hint="biosAssetHint"
      :accept="biosAccept"
      :button-text="'Pick BIOS'"
      :file-name="biosFile?.name"
      @select="onBiosSelect"
      @remove="onBiosRemove"
    />
    <CDropArea
      :prompt="'Drop ROM File'"
      :asset-hint="romAssetHint"
      :accept="romAccept"
      :button-text="'Pick ROM'"
      :file-name="romFile?.name"
      @select="onRomSelect"
      @remove="onRomRemove"
    />
  </div>

  <button type="submit" class="launch-btn" :disabled="!canLaunch">
    Launch Engine
  </button>

  <div class="status">{{ status }}</div>
</form>

<script :setup="{
  CSdkInfo,
  CDropArea,
  sdkInfo,
  onLaunchFiles,
  onSaveBios,
  onSaveRom,
  onRemoveBios,
  onRemoveRom,
  initialRomFile = null,
  initialBiosFile = null,
  romAccept,
  romAssetHint = 'or choose ROM file from computer',
  biosAccept,
  biosAssetHint = 'optional BIOS firmware file',
  requiresBIOS = false,
  showBIOS = false,
}">
  let romFile = initialRomFile;
  let biosFile = initialBiosFile;

  let canLaunch = Boolean(romFile && (!requiresBIOS || biosFile));
  let status = "";

  const updateStatus = () => {
    canLaunch = Boolean(romFile && (!requiresBIOS || biosFile));
    if (requiresBIOS && !biosFile && !romFile) {
      status = "Ready - Please select ROM and BIOS files to launch.";
    } else if (requiresBIOS && !biosFile) {
      status = "BIOS file is required to launch.";
    } else if (!romFile) {
      status = "Ready - Please select a ROM file to launch.";
    } else {
      status = `Ready to launch! (${romFile.name}${biosFile ? ' + BIOS' : ''})`;
    }
  };

  updateStatus();

  const extractFile = (arg) => {
    if (!arg) return null;
    if (arg instanceof File) return arg;
    if (arg.detail instanceof File) return arg.detail;
    if (arg.detail) return extractFile(arg.detail);
    return null;
  };

  const onRomSelect = (arg) => {
    const file = extractFile(arg);
    if (!file) {
      onRomRemove();
      return;
    }
    romFile = file;
    updateStatus();
    onSaveRom?.(file);
  };

  const onBiosSelect = (arg) => {
    const file = extractFile(arg);
    if (!file) {
      onBiosRemove();
      return;
    }
    biosFile = file;
    updateStatus();
    onSaveBios?.(file);
  };

  const onRomRemove = () => {
    romFile = null;
    updateStatus();
    onRemoveRom?.();
  };

  const onBiosRemove = () => {
    biosFile = null;
    updateStatus();
    onRemoveBios?.();
  };

  const onLaunch = async () => {
    if (!canLaunch) {
      updateStatus();
      return;
    }
    try {
      status = `Launching with ${romFile.name}...`;
      await onLaunchFiles({ rom: romFile, bios: biosFile });
    } catch (error) {
      const message = error instanceof Error ? error.message : String(error);
      status = `Failed to load engine: ${message}`;
    }
  };
</script>
