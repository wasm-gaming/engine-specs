<section class="drop" :class.active="dragging" :class.selected="selectedName"
    @dragover.prevent="dragging = true"
    @dragleave="dragging = false"
    @drop.prevent="onDrop">
    <strong>{{ prompt }}</strong>
    <p :class.file-selected="selectedName">{{ selectedName ? 'Selected: ' + selectedName : assetHint }}</p>
    <label class="picker">
        {{ selectedName ? 'Change File' : buttonText }}
        <input type="file" :accept="accept" @change="onPick" />
    </label>
</section>

<script :setup="{
  prompt,
  assetHint = 'or choose one from your computer',
  accept,
  buttonText = 'Pick file',
  fileName = '',
}">
  let dragging = false;
  let selectedName = fileName || "";

  const extractFile = (arg) => {
    if (!arg) return null;
    if (arg instanceof File) return arg;
    if (arg.detail instanceof File) return arg.detail;
    if (arg.target?.files?.item(0)) return arg.target.files.item(0);
    if (arg.dataTransfer?.files?.item(0)) return arg.dataTransfer.files.item(0);
    return null;
  };

  const emitFile = (file) => {
    if (!file) return;
    selectedName = file.name;
    $emit("select", file);
  };

  const onDrop = (event) => {
    dragging = false;
    const file = extractFile(event);
    if (file) emitFile(file);
  };

  const onPick = (event) => {
    const file = extractFile(event);
    if (file) emitFile(file);
  };
</script>
